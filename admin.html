<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin — Oasis Vivero</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body style="background: #f0f2f0;">

    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h2 style="font-family: 'Playfair Display', serif; color: var(--verde-oscuro);">Panel Admin</h2>
            <p style="color: var(--texto-suave); font-size: 0.9rem;">Acceso restringido</p>
            <input type="password" id="passInput" placeholder="Contraseña">
            <button class="btn-primary" style="width: 100%; border: none; cursor: pointer;" onclick="checkPass()">Entrar</button>
        </div>
    </div>

    <div id="adminContent" style="display: none;" class="admin-body">
        <div class="admin-header">
            <h1 style="font-family: 'Playfair Display', serif; color: var(--verde-oscuro);">Gestión de Stock</h1>
            <button class="btn-secondary" style="border:none; cursor:pointer;" onclick="location.href='oasis.html'">Ver Sitio →</button>
        </div>

        <!-- Formulario para añadir nuevas plantas -->
        <div style="background: var(--crema); padding: 2rem; border-radius: 1.5rem; margin-bottom: 3rem; border: 1px solid var(--crema-oscura);">
            <h2 style="font-family: 'Playfair Display', serif; color: var(--verde-oscuro); margin-bottom: 1.5rem;">Añadir Nueva Planta</h2>
            <form id="addPlantForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <input type="text" id="newName" placeholder="Nombre de la planta" required style="padding: 0.8rem; border-radius: 0.5rem; border: 1px solid var(--crema-oscura);">
                <select id="newCategory" required style="padding: 0.8rem; border-radius: 0.5rem; border: 1px solid var(--crema-oscura);">
                    <option value="" disabled selected>Categoría</option>
                    <option value="cactus">Cactus</option>
                    <option value="suculentas">Suculentas</option>
                    <option value="interior">Interior</option>
                    <option value="colgantes">Colgantes</option>
                    <option value="aromaticas">Aromáticas</option>
                    <option value="orquideas">Orquídeas</option>
                </select>
                <input type="number" id="newPrice" placeholder="Precio ($)" required style="padding: 0.8rem; border-radius: 0.5rem; border: 1px solid var(--crema-oscura);">
                <input type="number" id="newStock" placeholder="Stock inicial" required style="padding: 0.8rem; border-radius: 0.5rem; border: 1px solid var(--crema-oscura);">
                <textarea id="newDesc" placeholder="Breve descripción" required style="grid-column: span 2; padding: 0.8rem; border-radius: 0.5rem; border: 1px solid var(--crema-oscura); font-family: inherit;"></textarea>
                <input type="text" id="newImgEmoji" placeholder="Emoji (ej: 🌵)" value="🪴" required style="padding: 0.8rem; border-radius: 0.5rem; border: 1px solid var(--crema-oscura);">
                <input type="file" id="newImageFile" accept="image/*" style="padding: 0.6rem; border-radius: 0.5rem; border: 1px solid var(--crema-oscura); background: white;">
                <button type="submit" class="btn-primary" style="grid-column: span 2; border: none; cursor: pointer;">Guardar Nueva Planta 🌱</button>
            </form>
        </div>

            <div style="margin-bottom: 1.5rem;">
                <input type="text" id="adminSearch" placeholder="🔍 Buscar producto por nombre..." style="width: 100%; padding: 0.8rem; border-radius: 0.5rem; border: 1px solid var(--crema-oscura); outline: none;">
            </div>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Stock Actual</th>
                    <th>Emoji</th>
                    <th>Subir Foto</th>
                    <th>Nuevo Stock</th>
                    <th>Ocultar</th>
                </tr>
            </thead>
            <tbody id="adminProductList"></tbody>
        </table>
        
        <div style="margin-top: 2rem; text-align: right;">
            <button class="btn-primary" style="border: none; cursor: pointer;" onclick="saveChanges()">Guardar Cambios</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const ADMIN_PASS = "admin123"; // Cambia esto por la contraseña que quieras
        const INACTIVITY_LIMIT = 30 * 60 * 1000; // 30 minutos en milisegundos

        // Verificar si ya inició sesión anteriormente en esta pestaña
        document.addEventListener('DOMContentLoaded', () => {
            const lastActivity = sessionStorage.getItem('oasis-admin-last-activity');
            const isLogged = sessionStorage.getItem('oasis-admin-logged') === 'true';

            // Si está logueado pero pasó el tiempo de inactividad, limpiar sesión
            if (isLogged && lastActivity && (Date.now() - parseInt(lastActivity) > INACTIVITY_LIMIT)) {
                sessionStorage.removeItem('oasis-admin-logged');
                sessionStorage.removeItem('oasis-admin-last-activity');
            } else if (isLogged) {
                updateActivity();
                showAdminPanel();
            }
        });

        function updateActivity() {
            if (sessionStorage.getItem('oasis-admin-logged') === 'true') {
                sessionStorage.setItem('oasis-admin-last-activity', Date.now().toString());
            }
        }

        // Escuchar eventos comunes para detectar que el usuario sigue ahí
        ['mousedown', 'keydown', 'scroll', 'touchstart'].forEach(event => {
            document.addEventListener(event, updateActivity);
        });

        // Comprobación en tiempo real: si el usuario deja la pestaña abierta sin hacer nada
        setInterval(() => {
            const lastActivity = sessionStorage.getItem('oasis-admin-last-activity');
            if (sessionStorage.getItem('oasis-admin-logged') === 'true' && lastActivity) {
                if (Date.now() - parseInt(lastActivity) > INACTIVITY_LIMIT) {
                    sessionStorage.removeItem('oasis-admin-logged');
                    sessionStorage.removeItem('oasis-admin-last-activity');
                    alert("Tu sesión ha expirado por inactividad.");
                    location.reload();
                }
            }
        }, 10000); // Revisa cada 10 segundos

        function checkPass() {
            const input = document.getElementById('passInput').value;
            if (input === ADMIN_PASS) {
                sessionStorage.setItem('oasis-admin-logged', 'true');
                updateActivity();
                showAdminPanel();
            } else {
                alert("Contraseña incorrecta");
            }
        }

        function showAdminPanel() {
            const overlay = document.getElementById('loginOverlay');
            const content = document.getElementById('adminContent');
            if (overlay) overlay.style.display = 'none';
            if (content) {
                content.style.display = 'block';
                loadAdminProducts();
            }
        }

        function loadAdminProducts(filterTerm = '') {
            const list = document.getElementById('adminProductList');
            const term = filterTerm.toLowerCase();
            const filtered = PRODUCTS_DATA.filter(p => p.name.toLowerCase().includes(term));

            list.innerHTML = filtered.map(p => `
                <tr>
                    <td style="display:flex; align-items:center; gap:10px;">
                        <span style="font-size:1.5rem;">${p.img}</span>
                        <div>
                            ${p.image ? `<img src="${p.image}" alt="${p.name}" style="width: 30px; height: 30px; object-fit: cover; border-radius: 5px; margin-right: 5px;">` : ''}

                            <strong>${p.name}</strong><br>
                            <small style="color:var(--texto-suave)">${p.category}</small>
                        </div>
                    </td>
                    <td>$${p.price}</td>
                    <td>
                        <span class="${p.stock < 3 ? 'low-stock-alert' : ''}">
                            ${p.stock} unidades
                        </span>
                    </td>
                    <td>
                        <input type="text" class="input-emoji" data-product="${p.name}" value="${p.img}" style="width: 40px; padding: 0.5rem; border-radius: 0.5rem; border: 1px solid var(--crema-oscura); text-align: center;">
                    </td>
                    <td>
                        <input type="file" class="input-image-file" data-product="${p.name}" accept="image/*" style="width: 150px; font-size: 0.7rem;">
                    </td>
                    <td>
                        <input type="number" class="input-stock" data-product="${p.name}" value="${p.stock}" min="0">
                    </td>
                    <td>
                        <input type="checkbox" class="input-hidden" data-product="${p.name}" ${p.isHidden ? 'checked' : ''}>
                    </td>
                </tr>
            `).join('');
        }

        async function saveChanges() {
            const stockInputs = document.querySelectorAll('.input-stock');
            const emojiInputs = document.querySelectorAll('.input-emoji');
            const hiddenInputs = document.querySelectorAll('.input-hidden');
            const imageFileInputs = document.querySelectorAll('.input-image-file');

            const stockOverrides = JSON.parse(localStorage.getItem('oasis-stock-overrides') || '{}');
            const emojiOverrides = JSON.parse(localStorage.getItem('oasis-emoji-overrides') || '{}');
            const imageOverrides = JSON.parse(localStorage.getItem('oasis-image-overrides') || '{}');
            const hiddenStates = JSON.parse(localStorage.getItem('oasis-hidden-products') || '{}');
            
            stockInputs.forEach(input => { stockOverrides[input.dataset.product] = input.value; });
            emojiInputs.forEach(input => { emojiOverrides[input.dataset.product] = input.value; });
            hiddenInputs.forEach(input => { hiddenStates[input.dataset.product] = input.checked; });

            // Procesar nuevos archivos subidos para plantas existentes
            for (const input of imageFileInputs) {
                if (input.files && input.files[0]) {
                    try {
                        const base64 = await toBase64(input.files[0]);
                        imageOverrides[input.dataset.product] = base64;
                    } catch (err) { console.error("Error al procesar imagen:", err); }
                }
            }

            localStorage.setItem('oasis-stock-overrides', JSON.stringify(stockOverrides));
            localStorage.setItem('oasis-emoji-overrides', JSON.stringify(emojiOverrides));
            localStorage.setItem('oasis-image-overrides', JSON.stringify(imageOverrides));
            localStorage.setItem('oasis-hidden-products', JSON.stringify(hiddenStates));

            alert("¡Cambios guardados correctamente!");
            location.reload();
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // Permitir entrar con la tecla Enter
        document.getElementById('passInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPass();
        });

        // Autocompletar emoji según la categoría seleccionada
        document.getElementById('newCategory').addEventListener('change', (e) => {
            const emojis = {
                'cactus': '🌵',
                'suculentas': '🌸',
                'interior': '🪴',
                'colgantes': '🌿',
                'aromaticas': '🌻',
                'orquideas': '🌺'
            };
            if (emojis[e.target.value]) {
                document.getElementById('newImgEmoji').value = emojis[e.target.value];
            }
        });

        document.getElementById('addPlantForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('newName').value;
            const category = document.getElementById('newCategory').value;
            const price = parseInt(document.getElementById('newPrice').value);
            const stock = parseInt(document.getElementById('newStock').value);
            const desc = document.getElementById('newDesc').value;
            const img = document.getElementById('newImgEmoji').value; // NEW
            const imageFile = document.getElementById('newImageFile').files[0];
            
            let image = '';
            if (imageFile) {
                try {
                    image = await toBase64(imageFile);
                } catch (err) { console.error("Error al cargar la imagen:", err); }
            }

            const bgMapping = {
                'cactus': 'bg1',
                'suculentas': 'bg2',
                'colgantes': 'bg3',
                'aromaticas': 'bg4',
                'orquideas': 'bg5',
                'interior': 'bg6'
            };
            const bg = bgMapping[category] || 'bg3';

            const newPlant = {
                name, price, img, image, desc, bg, category, stock, isHidden: false
            };

            const custom = JSON.parse(localStorage.getItem('oasis-custom-products') || '[]');
            if (PRODUCTS_DATA.find(p => p.name === name) || custom.find(p => p.name === name)) {
                return alert("Ya existe una planta con ese nombre.");
            }

            custom.push(newPlant);
            localStorage.setItem('oasis-custom-products', JSON.stringify(custom));
            alert("¡Planta añadida con éxito!");
            location.reload();
        });

        // Buscador en tiempo real para la tabla de administración
        document.getElementById('adminSearch').addEventListener('input', (e) => {
            loadAdminProducts(e.target.value);
        });
    </script>
</body>
</html>
