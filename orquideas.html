<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orquídeas — Oasis Vivero</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="navbar-shared"></div>

<section class="catalogo" style="padding-top: 8rem;">
  <div class="catalogo-header">
    <div>
      <p class="section-tag">Colección</p>
      <h2 class="section-title">Orquídeas</h2>
      <p class="section-sub">La elegancia en su máxima expresión. Plantas exclusivas para regalar o decorar con distinción.</p>
    </div>
  </div>

  <div class="cards-grid">
    <!-- EJEMPLO ORQUÍDEA 1 -->
    <div class="plant-card reveal active">
      <div class="plant-img bg5">
        🌺
      </div>
      <div class="plant-info">
        <div class="plant-name">Orquídea Phalaenopsis</div>
        <div class="plant-desc">Belleza exótica de larga floración. Un regalo inolvidable.</div>
        <div class="plant-footer">
          <span class="plant-price">$8.500</span>
          <button class="btn-agregar" data-name="Orquídea Phalaenopsis" onclick="addToCart('Orquídea Phalaenopsis', 8500, '🌺', '', 'orquideas')">Añadir al carrito</button>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-shared"></div>

<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h2 style="font-family: 'Playfair Display', serif; color: var(--verde-oscuro);">Tu Carrito</h2>
    <button class="cart-close" id="closeCart">✕</button>
  </div>
  <div class="cart-items" id="cartItemsList"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total estimado:</span>
      <span id="cartTotalText">$0</span>
    </div>
    <button class="btn-primary" style="width: 100%; border: none; cursor: pointer;" onclick="sendCartWhatsApp()">Enviar pedido por WhatsApp 🌿</button>
    <button class="btn-share" onclick="shareCartSocial()">Compartir carrito 📤</button>
    <button class="btn-clear" onclick="clearCart()">Vaciar Carrito</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
