<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plantas Ornamentales — Oasis Vivero</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body data-category="interior">

<div id="navbar-shared"></div>

<section class="catalogo" style="padding-top: 8rem;">
  <div class="catalogo-header">
    <div>
      <p class="section-tag">Colección</p>
      <h2 class="section-title">Plantas Ornamentales</h2>
      <p class="section-sub">Dale vida y aire puro a tus ambientes cerrados con nuestras variedades seleccionadas.</p>
      <div class="search-container">
        <div class="search-wrapper">
          <input type="text" id="plantSearch" class="search-input" placeholder="Buscar plantas de interior...">
          <button id="clearSearch" class="search-clear">✕</button>
        </div>
        <div class="controls-row">
          <select id="priceSort" class="sort-select">
            <option value="default">Ordenar por</option>
            <option value="low">Precio: Menor a Mayor</option>
            <option value="high">Precio: Mayor a Menor</option>
            <option value="az">Nombre: A a la Z</option>
            <option value="za">Nombre: Z a la A</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div class="cards-grid" id="mainGrid">
    
    <!-- Las tarjetas de las plantas se cargarán aquí automáticamente desde script.js -->
  </div>

  <div id="noResults" style="display: none; text-align: center; padding: 4rem 2rem; color: var(--texto-suave);">
    <p style="font-size: 1.2rem; font-family: 'Playfair Display', serif;">No se encontraron plantas que coincidan 🌱</p>
  </div>
</section>

<div id="footer-shared"></div>

<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h2 style="font-family: 'Playfair Display', serif; color: var(--verde-oscuro);">Tu Carrito</h2>
    <button class="cart-close" id="closeCart">✕</button>
  </div>
  <div class="cart-items" id="cartItemsList"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total estimado:</span>
      <span id="cartTotalText">$0</span>
    </div>
    <button class="btn-primary" style="width: 100%; border: none; cursor: pointer;" onclick="sendCartWhatsApp()">Enviar pedido por WhatsApp 🌿</button>
    <button class="btn-clear" onclick="clearCart()">Vaciar Carrito</button>
  </div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
