<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aromáticas — Oasis Vivero</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="navbar-shared"></div>

<section class="catalogo" style="padding-top: 8rem;">
  <div class="catalogo-header">
    <div>
      <p class="section-tag">Colección</p>
      <h2 class="section-title">Hierbas Aromáticas</h2>
      <p class="section-sub">Lleva sabores y perfumes naturales a tu cocina y jardín con nuestras hierbas frescas.</p>
    </div>
     <a href="ver-todo.html" class="btn-secondary">← Volver al catálogo</a>
  </div>


  <div class="cards-grid" id="mainGrid">
    <!-- EJEMPLO AROMÁTICA 1 -->
    <div class="plant-card reveal active">
      <div class="plant-img bg4">
       <img src="./imgs/suculentas/moneymaker.jpeg" alt="Money Maker Variegada" loading="lazy"> 
      </div>
      <div class="plant-info">
        <div class="plant-name">Lavanda</div>
        <div class="plant-desc">Fragancia relajante y hermosas flores violetas para exterior.</div>
        <div class="plant-footer">
          <span class="plant-price">$2000</span>
          <button class="btn-agregar">Añadir al carrito</button>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-shared"></div>

<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h2 style="font-family: 'Playfair Display', serif; color: var(--verde-oscuro);">Tu Carrito</h2>
    <button class="cart-close" id="closeCart">✕</button>
  </div>
  <div class="cart-items" id="cartItemsList"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total estimado:</span>
      <span id="cartTotalText">$0</span>
    </div>
    <button class="btn-primary" style="width: 100%; border: none; cursor: pointer;" onclick="sendCartWhatsApp()">Enviar pedido por WhatsApp 🌿</button>
    <button class="btn-share" onclick="shareCartSocial()">Compartir carrito 📤</button>
    <button class="btn-clear" onclick="clearCart()">Vaciar Carrito</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
